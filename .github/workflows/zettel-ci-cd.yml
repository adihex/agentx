name: Zettel CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering from GHA UI or `gh workflow run zettel-ci-cd.yml`

permissions:
  contents: "read"
  id-token: "write" # Required for Workload Identity Federation OIDC token exchange

jobs:
  # ─── Phase 1: Validate ─────────────────────────────────────────────────────
  validate-and-test:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: "pnpm"

      - name: Cache Vite+ Task Cache
        uses: actions/cache@v4
        with:
          path: node_modules/.vite/task-cache
          key: ${{ runner.os }}-vite-plus-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vite-plus-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-plus-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean dist (prevent stale hashed assets from cache replays)
        run: rm -rf apps/zettel/dist apps/zettel/dist-server

      - name: Build Zettel and dependencies
        run: pnpm exec vp run @agentx/zettel#build

      - name: Run Zettel Tests
        run: pnpm exec vitest run apps/zettel

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zettel-frontend
          path: apps/zettel/dist
          retention-days: 1

  # ─── Phase 2: Build & Deploy Backend ───────────────────────────────────────
  # Must succeed before frontend is deployed (expand-contract pattern:
  # new API is live before the frontend that depends on it)
  deploy-backend:
    name: Deploy Backend → Cloud Run
    needs: validate-and-test
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Vite+ Task Cache
        uses: actions/cache/restore@v4
        with:
          path: node_modules/.vite/task-cache
          key: ${{ runner.os }}-vite-plus-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vite-plus-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-plus-

      - name: Prepare Vite+ Cache for Docker Build
        run: |
          if [ -d node_modules/.vite/task-cache ]; then
            echo "Found Vite+ task cache. Copying to .vite-task-cache for Docker context..."
            mkdir -p .vite-task-cache
            cp -r node_modules/.vite/task-cache/* .vite-task-cache/
            ls -la .vite-task-cache
          else
            echo "No Vite+ task cache found on runner."
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          workload_identity_provider: "projects/594828290101/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-sa@agentx-zettel-adi-3291.iam.gserviceaccount.com"

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-south1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: zettel
          push: true
          tags: |
            asia-south1-docker.pkg.dev/agentx-zettel-adi-3291/agentx-repo/zettel:${{ github.sha }}
            asia-south1-docker.pkg.dev/agentx-zettel-adi-3291/agentx-repo/zettel:latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zettel-service
          image: asia-south1-docker.pkg.dev/agentx-zettel-adi-3291/agentx-repo/zettel:${{ github.sha }}
          region: asia-south1
          env_vars: |
            COMMIT_SHA=${{ github.sha }}
            AGENT_MODEL=mimo-v2.5
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          flags: "--memory=1Gi"

      - name: Smoke Test — verify new revision is healthy
        id: smoke
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Testing $URL/_health ..."
          # 12 retries × 10s = 2 min total — covers Cloud Run cold starts
          for i in $(seq 1 12); do
            STATUS=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" "$URL/_health" || echo "000")
            echo "Attempt $i/12: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Smoke test failed after 2 min — rolling back Cloud Run to previous revision"
          PREV=$(gcloud run revisions list \
            --service zettel-service \
            --region asia-south1 \
            --format="value(name)" \
            --limit=2 | tail -1)
          if [ -n "$PREV" ]; then
            gcloud run services update-traffic zettel-service \
              --to-revisions="$PREV=100" \
              --region asia-south1
            echo "Rolled back to $PREV"
          fi
          exit 1

      - name: Show Service URL
        run: echo "Backend deployed → ${{ steps.deploy.outputs.url }}"

  # ─── Phase 3: Deploy Frontend ───────────────────────────────────────────────
  # Only runs after backend is confirmed healthy (smoke test passed).
  # Rollback: git revert the commit in adihex.github.io
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: zettel-frontend
          path: dist

      - name: Push to adihex.github.io
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${PAGES_PAT}@github.com/adihex/adihex.github.io.git pages-repo
          # Sync dist/ → pages-repo/zettel/ (delete removed files, copy new ones)
          rsync -av --delete dist/ pages-repo/zettel/
          cd pages-repo
          git add -A
          # Only commit+push if there are actual changes
          if git diff --staged --quiet; then
            echo "No frontend changes to deploy."
          else
            git commit -m "Deploy zettel frontend @ ${{ github.sha }}"
            git push
            echo "Frontend deployed → https://adihex.github.io/zettel/"
          fi
